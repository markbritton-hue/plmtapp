<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet Setup — PLMTApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --navy: #0f172a; --navy2: #1e293b; --navy3: #334155;
      --blue: #3b82f6; --blue-dark: #2563eb;
      --green: #22c55e; --red: #ef4444;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .navbar { background: var(--navy2); border-bottom: 1px solid var(--navy3); }
    .nav-link { color: var(--muted) !important; }
    .nav-link:hover, .nav-link.active { color: var(--text) !important; }
    .card { background: var(--navy2); border: 1px solid var(--navy3); color: var(--text); }
    .card-header { background: var(--navy3); border-bottom: 1px solid var(--navy3); font-weight: 600; }
    .form-control, .form-select {
      background: var(--navy3); border: 1px solid #475569; color: var(--text);
    }
    .form-control:focus, .form-select:focus {
      background: var(--navy3); color: var(--text); border-color: var(--blue);
      box-shadow: 0 0 0 0.2rem rgba(59,130,246,.25);
    }
    .form-control::placeholder { color: var(--muted); }
    .form-label { color: var(--muted); font-size: .875rem; margin-bottom: .25rem; }
    .btn-primary { background: var(--blue); border-color: var(--blue); }
    .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .btn-outline-secondary { color: var(--muted); border-color: var(--navy3); }
    .btn-outline-secondary:hover { background: var(--navy3); color: var(--text); border-color: var(--navy3); }
    .table { color: var(--text); }
    .table thead th { border-color: var(--navy3); color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; }
    .table tbody tr { border-color: var(--navy3); }
    .table tbody tr:hover { background: rgba(255,255,255,.03); }
    .badge-active { background: var(--green); color: #fff; font-size: .7rem; padding: .2em .55em; border-radius: 999px; font-weight: 600; }
    .alert-success { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.3); color: #86efac; }
    .alert-danger { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.3); color: #fca5a5; }

    /* Modal */
    .modal-content { background: var(--navy2); border: 1px solid var(--navy3); color: var(--text); }
    .modal-header { border-bottom: 1px solid var(--navy3); }
    .modal-footer { border-top: 1px solid var(--navy3); }
    .btn-close { filter: invert(1); }

    /* Weight class chips */
    .platform-wc-block { background: var(--navy3); border-radius: 8px; padding: .7rem 1rem; margin-bottom: .6rem; }
    .platform-wc-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--blue); margin-bottom: .5rem; }
    .wc-chips { display: flex; flex-wrap: wrap; gap: .3rem; }
    .wc-chip {
      padding: .22rem .55rem; border-radius: 5px; font-size: .76rem; font-weight: 600;
      border: 1px solid #475569; background: var(--navy2); color: var(--muted);
      cursor: pointer; user-select: none; transition: all .12s;
    }
    .wc-chip.selected { background: rgba(59,130,246,.2); border-color: var(--blue); color: #93c5fd; }

    .wc-summary { font-size: .7rem; color: var(--muted); margin-top: .25rem; line-height: 1.5; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="fa-solid fa-trophy" style="color:var(--blue);font-size:1.3rem;"></i>
        <span style="font-weight:700;font-size:1.1rem;">PLMTApp</span>
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="setup.html">Setup</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
          <li class="nav-item"><a class="nav-link" href="platform.html">Platform</a></li>
          <li class="nav-item"><a class="nav-link" href="display.html">Display</a></li>
          <li class="nav-item"><a class="nav-link" href="results.html">Results</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container px-4" style="max-width:960px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="fw-bold mb-0" style="font-size:1.6rem;">Meet Setup</h1>
        <p class="mb-0 mt-1" style="color:var(--muted);">Manage meets and load one as active.</p>
      </div>
      <button class="btn btn-primary" id="addMeetBtn">
        <i class="fa-solid fa-plus me-2"></i>Add Meet
      </button>
    </div>

    <div id="statusMsg"></div>

    <!-- Meets list -->
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span><i class="fa-solid fa-list me-2" style="color:var(--blue);"></i>Meets</span>
        <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>
      <div class="card-body p-0">
        <table class="table table-borderless mb-0">
          <thead>
            <tr>
              <th class="ps-3">Name</th>
              <th>Date</th>
              <th>Location</th>
              <th>Platforms</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="meetsBody">
            <tr><td colspan="6" class="text-center py-4" style="color:var(--muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add / Edit Meet Modal -->
  <div class="modal fade" id="meetModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Add Meet</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="meetForm">
            <input type="hidden" id="editMeetId" />
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label">Meet Name</label>
                <input type="text" class="form-control" id="meetName" placeholder="e.g. Spring Invitational 2026" required />
              </div>
              <div class="col-md-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" id="meetDate" required />
              </div>
              <div class="col-md-3">
                <label class="form-label">Platforms</label>
                <input type="number" class="form-control" id="meetPlatforms" min="1" max="20" value="1" required />
              </div>
              <div class="col-12">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" id="meetLocation" placeholder="e.g. Springfield High School" />
              </div>
            </div>

            <!-- Weight classes per platform -->
            <div id="wcSection" style="display:none;">
              <div style="font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.65rem;">
                <i class="fa-solid fa-scale-balanced me-2" style="color:var(--blue);"></i>Weight Classes per Platform
              </div>
              <div id="wcPlatformBlocks"></div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="saveBtn">
            <i class="fa-solid fa-floppy-disk me-2"></i>Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, addDoc, updateDoc, getDocs, doc,
      serverTimestamp, orderBy, query
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { setActiveMeet, getActiveMeetId } from "./meet-utils.js";

    const meetsBody = document.getElementById("meetsBody");
    const statusMsg = document.getElementById("statusMsg");
    const meetModal = new bootstrap.Modal(document.getElementById("meetModal"));
    const ALL_WC = ["97","105","114","123","132","145","148","155","165","181","194","198","207","220","242","275","308","SHW"];

    function showStatus(msg, type = "success") {
      statusMsg.innerHTML = `<div class="alert alert-${type} mb-3">${msg}</div>`;
      setTimeout(() => statusMsg.innerHTML = "", 4000);
    }

    // ── Weight class blocks ──────────────────────────────────────────────────

    document.getElementById("meetPlatforms").addEventListener("input", () => {
      buildWcBlocks(parseInt(document.getElementById("meetPlatforms").value) || 0);
    });

    function buildWcBlocks(n, existing = {}) {
      const section = document.getElementById("wcSection");
      const container = document.getElementById("wcPlatformBlocks");
      container.innerHTML = "";
      if (n < 1) { section.style.display = "none"; return; }
      section.style.display = "";
      for (let i = 1; i <= n; i++) {
        const assigned = (existing[String(i)] || []);
        const block = document.createElement("div");
        block.className = "platform-wc-block";
        block.innerHTML = `<div class="platform-wc-label">Platform ${i}</div><div class="wc-chips" id="wc-p${i}"></div>`;
        container.appendChild(block);
        const chipsEl = block.querySelector(`#wc-p${i}`);
        ALL_WC.forEach(wc => {
          const chip = document.createElement("span");
          chip.className = "wc-chip" + (assigned.includes(wc) ? " selected" : "");
          chip.textContent = wc;
          chip.dataset.wc = wc;
          chip.addEventListener("click", () => chip.classList.toggle("selected"));
          chipsEl.appendChild(chip);
        });
      }
    }

    function getWcAssignments() {
      const result = {};
      document.querySelectorAll("#wcPlatformBlocks .platform-wc-block").forEach((block, i) => {
        result[String(i + 1)] = [...block.querySelectorAll(".wc-chip.selected")].map(c => c.dataset.wc);
      });
      return result;
    }

    // ── Open modal ───────────────────────────────────────────────────────────

    document.getElementById("addMeetBtn").addEventListener("click", () => {
      document.getElementById("editMeetId").value = "";
      document.getElementById("meetForm").reset();
      document.getElementById("modalTitle").textContent = "Add Meet";
      buildWcBlocks(parseInt(document.getElementById("meetPlatforms").value) || 1);
      meetModal.show();
    });

    function openEdit(id, m) {
      document.getElementById("editMeetId").value = id;
      document.getElementById("meetName").value = m.name || "";
      document.getElementById("meetDate").value = m.date || "";
      document.getElementById("meetLocation").value = m.location || "";
      document.getElementById("meetPlatforms").value = m.platforms || 1;
      document.getElementById("modalTitle").textContent = "Edit Meet";
      buildWcBlocks(m.platforms || 1, m.platformWeightClasses || {});
      meetModal.show();
    }

    // ── Save ─────────────────────────────────────────────────────────────────

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const form = document.getElementById("meetForm");
      if (!form.reportValidity()) return;

      const editId = document.getElementById("editMeetId").value;
      const name = document.getElementById("meetName").value.trim();
      const date = document.getElementById("meetDate").value;
      const location = document.getElementById("meetLocation").value.trim();
      const platforms = parseInt(document.getElementById("meetPlatforms").value) || 1;
      const platformWeightClasses = getWcAssignments();

      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Saving…';

      try {
        if (editId) {
          await updateDoc(doc(db, "meets", editId), { name, date, location, platforms, platformWeightClasses });
          showStatus(`<i class="fa-solid fa-check me-2"></i>Meet "<strong>${esc(name)}</strong>" updated.`);
        } else {
          const docRef = await addDoc(collection(db, "meets"), {
            name, date, location, platforms, platformWeightClasses, createdAt: serverTimestamp()
          });
          setActiveMeet(docRef.id);
          showStatus(`<i class="fa-solid fa-check me-2"></i>Meet "<strong>${esc(name)}</strong>" created and set as active!`);
        }
        meetModal.hide();
        loadMeets();
      } catch (e) {
        showStatus(`Error: ${esc(e.message)}`, "danger");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk me-2"></i>Save';
      }
    });

    // ── Load meets ───────────────────────────────────────────────────────────

    async function loadMeets() {
      meetsBody.innerHTML = `<tr><td colspan="6" class="text-center py-4" style="color:var(--muted);">Loading…</td></tr>`;
      try {
        const q = query(collection(db, "meets"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        if (snap.empty) {
          meetsBody.innerHTML = `<tr><td colspan="6" class="text-center py-4" style="color:var(--muted);">No meets yet. Click <strong>Add Meet</strong> to get started.</td></tr>`;
          return;
        }
        const activeMeetId = getActiveMeetId();
        meetsBody.innerHTML = "";
        snap.forEach(d => {
          const m = d.data();
          const isActive = d.id === activeMeetId;

          // Build WC summary
          let wcSummary = "";
          if (m.platformWeightClasses) {
            const lines = [];
            for (let p = 1; p <= (m.platforms || 1); p++) {
              const wcs = m.platformWeightClasses[String(p)];
              if (wcs && wcs.length) lines.push(`P${p}: ${wcs.join(", ")}`);
            }
            if (lines.length) wcSummary = `<div class="wc-summary">${lines.map(l => esc(l)).join("<br>")}</div>`;
          }

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="ps-3 fw-semibold">${esc(m.name)}</td>
            <td>${esc(m.date || "")}</td>
            <td>${esc(m.location || "")}</td>
            <td>${m.platforms || 1}${wcSummary}</td>
            <td>${isActive ? '<span class="badge-active">Active</span>' : ""}</td>
            <td class="pe-3 text-end" style="white-space:nowrap;">
              ${isActive ? "" : `<button class="btn btn-sm btn-outline-secondary me-1" data-load="${d.id}">Load</button>`}
              <button class="btn btn-sm btn-outline-secondary" data-edit="${d.id}" title="Edit">
                <i class="fa-solid fa-pen-to-square"></i>
              </button>
            </td>`;
          tr.querySelector("[data-load]")?.addEventListener("click", () => {
            setActiveMeet(d.id);
            showStatus(`<i class="fa-solid fa-check me-2"></i>Meet "<strong>${esc(m.name)}</strong>" is now active.`);
            loadMeets();
          });
          tr.querySelector("[data-edit]").addEventListener("click", () => openEdit(d.id, m));
          meetsBody.appendChild(tr);
        });
      } catch (e) {
        meetsBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Error: ${esc(e.message)}</td></tr>`;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadMeets);

    function esc(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    loadMeets();
  </script>
</body>
</html>
