<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform — PLMTApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --navy: #0f172a; --navy2: #1e293b; --navy3: #334155;
      --blue: #3b82f6; --blue-dark: #2563eb;
      --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .navbar { background: var(--navy2); border-bottom: 1px solid var(--navy3); }
    .nav-link { color: var(--muted) !important; }
    .nav-link:hover, .nav-link.active { color: var(--text) !important; }
    .card { background: var(--navy2); border: 1px solid var(--navy3); color: var(--text); }
    .card-header { background: var(--navy3); border-bottom: 1px solid var(--navy3); font-weight: 600; }
    .alert-warning { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: #fcd34d; }

    /* Platform selector tabs */
    .platform-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .platform-tab {
      padding: .45rem 1.2rem; border-radius: 6px; border: 1px solid var(--navy3);
      background: var(--navy2); color: var(--muted); cursor: pointer;
      font-size: .9rem; font-weight: 500; transition: all .15s;
    }
    .platform-tab:hover { background: var(--navy3); color: var(--text); }
    .platform-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* Athlete card */
    .athlete-card {
      background: var(--navy2); border: 1px solid var(--navy3); border-radius: 10px;
      margin-bottom: 1rem; overflow: hidden;
    }
    .athlete-header {
      background: var(--navy3); padding: .6rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .athlete-name { font-weight: 700; font-size: 1rem; }
    .athlete-meta { font-size: .78rem; color: var(--muted); }
    .athlete-body { padding: .75rem 1rem; }

    /* Events grid — three columns side by side */
    .events-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
    .event-col { min-width: 0; }
    .event-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin-bottom: .4rem; display: flex; align-items: center; gap: .4rem;
    }
    .event-best { color: #4ade80; font-size: .75rem; font-weight: 700; }
    .attempts-group { display: flex; flex-direction: column; gap: .35rem; }

    /* Attempt chip */
    .attempt-chip {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .35rem .65rem; border-radius: 6px; font-size: .82rem;
      font-weight: 600; border: 1px solid transparent; min-width: 70px;
      justify-content: space-between;
    }
    .attempt-empty { background: rgba(148,163,184,.08); color: var(--muted); border-color: var(--navy3); }
    .attempt-pending { background: rgba(148,163,184,.12); color: var(--text); border-color: #475569; }
    .attempt-good { background: rgba(34,197,94,.15); color: #86efac; border-color: rgba(34,197,94,.35); }
    .attempt-fail { background: rgba(239,68,68,.15); color: #fca5a5; border-color: rgba(239,68,68,.35); }

    .attempt-controls { display: flex; gap: .25rem; }
    .btn-good { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.35); color: #86efac; border-radius: 4px; padding: .2rem .5rem; font-size: .75rem; cursor: pointer; }
    .btn-good:hover { background: rgba(34,197,94,.3); }
    .btn-fail { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.35); color: #fca5a5; border-radius: 4px; padding: .2rem .5rem; font-size: .75rem; cursor: pointer; }
    .btn-fail:hover { background: rgba(239,68,68,.3); }
    .btn-clear { background: rgba(148,163,184,.12); border: 1px solid #475569; color: #94a3b8; border-radius: 4px; padding: .25rem .55rem; font-size: .8rem; cursor: pointer; }
    .btn-clear:hover { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); color: #fca5a5; }

    .weight-input {
      background: var(--navy3); border: 1px solid #475569; color: var(--text);
      border-radius: 4px; padding: .2rem .4rem; font-size: .82rem;
      width: 72px; text-align: center;
    }
    .weight-input:focus { outline: none; border-color: var(--blue); }
    .weight-save-btn {
      background: var(--blue); border: none; color: #fff; border-radius: 4px;
      padding: .2rem .55rem; font-size: .75rem; cursor: pointer;
    }
    .weight-save-btn:hover { background: var(--blue-dark); }

    /* Position badges */
    .position-badge {
      font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      padding: .2em .55em; border-radius: 999px; flex-shrink: 0;
    }
    .badge-lifting { background: rgba(239,68,68,.2); color: #f87171; border: 1px solid rgba(239,68,68,.5); font-size: .9rem; padding: .3em .75em; }
    .badge-ondeck  { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.35); }

    /* Card highlights */
    .card-lifting { border-color: rgba(34,197,94,.4) !important; }
    .card-ondeck  { border-color: rgba(245,158,11,.3) !important; }

    .total-badge {
      font-size: .75rem; padding: .25em .6em; border-radius: 999px;
      background: rgba(59,130,246,.2); color: #93c5fd; font-weight: 700;
    }
    .designation-badge { font-size: .68rem; padding: .15em .45em; border-radius: 999px; font-weight: 600; }
    .badge-varsity { background: rgba(168,85,247,.2); color: #d8b4fe; border: 1px solid rgba(168,85,247,.4); }
    .badge-jv      { background: rgba(34,197,94,.2);  color: #4ade80;  border: 1px solid rgba(34,197,94,.4); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="fa-solid fa-trophy" style="color:var(--blue);font-size:1.3rem;"></i>
        <span style="font-weight:700;font-size:1.1rem;">PLMTApp</span>
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="setup.html">Setup</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
          <li class="nav-item"><a class="nav-link active" href="platform.html">Platform</a></li>
          <li class="nav-item"><a class="nav-link" href="display.html">Display</a></li>
          <li class="nav-item"><a class="nav-link" href="results.html">Results</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4" style="max-width:1100px;">
    <div id="noMeetAlert" class="alert alert-warning d-none">
      <i class="fa-solid fa-triangle-exclamation me-2"></i>
      No active meet. <a href="setup.html" style="color:inherit;font-weight:600;">Go to Setup</a> to load a meet.
    </div>

    <div id="mainContent" class="d-none">
      <div class="d-flex align-items-center justify-content-between mb-1">
        <h1 class="fw-bold mb-0" style="font-size:1.6rem;">Platform Entry</h1>
        <span id="meetBadge" style="font-size:.85rem;color:var(--muted);"></span>
      </div>
      <p class="mb-3" style="color:var(--muted);">Mark attempts and enter 2nd/3rd attempt weights.</p>

      <div id="platformTabs" class="platform-tabs"></div>

      <!-- Current event selector -->
      <div class="platform-tabs mb-3" id="eventTabs">
        <button class="platform-tab active" data-event="squat">Squat</button>
        <button class="platform-tab" data-event="bench">Bench</button>
        <button class="platform-tab" data-event="dead">Deadlift</button>
      </div>

      <div id="athleteList"></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, onSnapshot, query, where, orderBy, updateDoc, doc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getActiveMeetId, getActiveMeet, calcTotal, bestSquat, bestBench, bestDead } from "./meet-utils.js";

    const meetId = getActiveMeetId();
    if (!meetId) {
      document.getElementById("noMeetAlert").classList.remove("d-none");
    } else {
      init();
    }

    let currentPlatform = 1;
    let currentEvent = "squat";
    let lastSnap = null;
    let unsubscribe = null;
    let pendingFocusField = null; // { aid, field } to auto-focus next attempt input after re-render
    let pendingAutoFill = null;   // { aid, field, value } — fill weight locally after fail, save on tab/Enter
    let stableOrder = [];   // athlete IDs in current display order
    let prevRound = -1;    // last round we sorted for; re-sort only when round advances
    let prevEventKey = ""; // re-sort when event changes too

    async function init() {
      const meet = await getActiveMeet();
      if (!meet) {
        document.getElementById("noMeetAlert").classList.remove("d-none");
        return;
      }
      document.getElementById("mainContent").classList.remove("d-none");
      document.getElementById("meetBadge").textContent = meet.name;

      const numPlatforms = meet.platforms || 1;
      renderTabs(numPlatforms);
      selectPlatform(1);

      // Event tabs
      document.getElementById("eventTabs").addEventListener("click", e => {
        const btn = e.target.closest("[data-event]");
        if (!btn) return;
        currentEvent = btn.dataset.event;
        stableOrder = []; prevRound = -1; prevEventKey = "";
        document.querySelectorAll("#eventTabs .platform-tab").forEach(b =>
          b.classList.toggle("active", b === btn));
        if (lastSnap) renderAthletes(lastSnap);
      });
    }

    function renderTabs(n) {
      const tabs = document.getElementById("platformTabs");
      tabs.innerHTML = "";
      for (let i = 1; i <= n; i++) {
        const btn = document.createElement("button");
        btn.className = "platform-tab" + (i === 1 ? " active" : "");
        btn.textContent = `Platform ${i}`;
        btn.addEventListener("click", () => selectPlatform(i));
        tabs.appendChild(btn);
      }
    }

    function selectPlatform(p) {
      currentPlatform = p;
      stableOrder = []; prevRound = -1; prevEventKey = "";
      document.querySelectorAll(".platform-tab").forEach((btn, i) => {
        btn.classList.toggle("active", i + 1 === p);
      });
      if (unsubscribe) unsubscribe();
      const q = query(
        collection(db, "meets", meetId, "athletes"),
        where("platform", "==", p),
        orderBy("liftOrder")
      );
      unsubscribe = onSnapshot(q, snap => { lastSnap = snap; renderAthletes(snap); });
    }

    function getNextAttemptWeight(a, event) {
      for (let n = 1; n <= 3; n++) {
        const result = a[`${event}${n}Result`] ?? "";
        const weight = a[`${event}${n}`] || 0;
        if (result === "") {
          // Pending attempt — if weight not set yet (2nd/3rd not entered), use previous attempt's
          // weight so the athlete stays in their current position until weight is filled in
          return weight > 0 ? weight : (n > 1 ? (a[`${event}${n - 1}`] || 0) : 0);
        }
      }
      return null; // all done
    }

    function renderAthletes(snap) {
      const list = document.getElementById("athleteList");
      if (snap.empty) {
        list.innerHTML = `<div style="color:var(--muted);text-align:center;padding:3rem 0;">No athletes on this platform.</div>`;
        return;
      }

      const athletes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      function getCurrentRound(list, ev) {
        let min = 3;
        for (const a of list) {
          let done = 0;
          for (let n = 1; n <= 3; n++) {
            if ((a[`${ev}${n}Result`] ?? "") !== "") done = n;
            else break;
          }
          if (done < 3) min = Math.min(min, done);
        }
        return Math.min(min + 1, 3);
      }

      const round = getCurrentRound(athletes, currentEvent);

      function isDone(a) {
        const result = a[`${currentEvent}${round}Result`] ?? "";
        if (result === "") return false;
        if (round === 3) return true;
        return (a[`${currentEvent}${round + 1}`] || 0) > 0;
      }

      // Only do a full weight-based reorder when the round advances or event changes.
      // Within a round: keep athletes in their established order; done athletes sink to bottom.
      const roundChanged = round !== prevRound || currentEvent !== prevEventKey;

      if (roundChanged || stableOrder.length === 0) {
        // New round — sort by this round's declared weight
        athletes.sort((a, b) => {
          const aDone = isDone(a), bDone = isDone(b);
          if (aDone !== bDone) return aDone ? 1 : -1;
          if (!aDone) {
            const wa = a[`${currentEvent}${round}`] || 0;
            const wb = b[`${currentEvent}${round}`] || 0;
            if (wa !== wb) return wa - wb;
          }
          return (a[`${currentEvent}1`] || 0) - (b[`${currentEvent}1`] || 0);
        });
        prevRound = round;
        prevEventKey = currentEvent;
      } else {
        // Same round — preserve established order; only move done athletes to bottom
        athletes.sort((a, b) => {
          const aDone = isDone(a), bDone = isDone(b);
          if (aDone !== bDone) return aDone ? 1 : -1;
          const ai = stableOrder.indexOf(a.id);
          const bi = stableOrder.indexOf(b.id);
          if (ai === -1) return 1;
          if (bi === -1) return -1;
          return ai - bi;
        });
      }
      stableOrder = athletes.map(a => a.id);

      list.innerHTML = "";
      athletes.forEach((a, idx) => {
        const position = idx === 0 ? "lifting" : idx === 1 ? "ondeck" : null;
        list.appendChild(buildAthleteCard(a.id, a, position));
      });

      // After re-render, focus the specific next attempt weight input for a good lift
      if (pendingFocusField) {
        const { aid, field } = pendingFocusField;
        const input = list.querySelector(`input.weight-input[data-aid="${aid}"][data-field="${field}"]`);
        if (input) {
          input.focus();
          input.select();
        }
        pendingFocusField = null;
      }

      // After re-render, populate and focus the auto-filled weight for a failed lift.
      // Saving (and thus reordering) is deferred until they tab or press Enter.
      if (pendingAutoFill) {
        const { aid, field, value } = pendingAutoFill;
        const input = list.querySelector(`input.weight-input[data-aid="${aid}"][data-field="${field}"]`);
        if (input) {
          input.value = value;
          input.focus();
          input.select();
        }
        pendingAutoFill = null;
      }
    }

    function buildAthleteCard(id, a, position = null) {
      const div = document.createElement("div");
      div.className = "athlete-card" + (position === "lifting" ? " card-lifting" : position === "ondeck" ? " card-ondeck" : "");
      const total = calcTotal(a);
      const desigClass = a.designation === "JV" ? "badge-jv" : "badge-varsity";

      const positionBadge = position === "lifting"
        ? `<span class="position-badge badge-lifting"><i class="fa-solid fa-circle-dot me-1"></i>Lifting</span>`
        : position === "ondeck"
        ? `<span class="position-badge badge-ondeck">On Deck</span>`
        : "";

      div.innerHTML = `
        <div class="athlete-header">
          <div class="d-flex align-items-center gap-2">
            ${positionBadge}
            <span class="athlete-name">${esc(a.name)}</span>
            <span class="designation-badge ${desigClass}">${esc(a.designation)}</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="athlete-meta">${esc(a.school)} · ${esc(a.weightClass)} · ${a.bodyWeight} lbs</span>
            ${total !== null ? `<span class="total-badge">Total: ${total}</span>` : ""}
          </div>
        </div>
        <div class="athlete-body">
          <div class="events-grid">
            <div class="event-col">
              <div class="event-label">Squat ${bestSquat(a) > 0 ? `<span class="event-best">${bestSquat(a)}</span>` : ""}</div>
              ${buildAttempts(id, a, "squat", position === "lifting")}
            </div>
            <div class="event-col">
              <div class="event-label">Bench ${bestBench(a) > 0 ? `<span class="event-best">${bestBench(a)}</span>` : ""}</div>
              ${buildAttempts(id, a, "bench", position === "lifting")}
            </div>
            <div class="event-col">
              <div class="event-label">Dead ${bestDead(a) > 0 ? `<span class="event-best">${bestDead(a)}</span>` : ""}</div>
              ${buildAttempts(id, a, "dead", position === "lifting")}
            </div>
          </div>
        </div>`;
      return div;
    }

    function buildAttempts(athleteId, a, event, isLifting = false) {
      return `
        <div class="attempts-group">
          ${buildAttemptCell(athleteId, a, event, 1, isLifting)}
          ${buildAttemptCell(athleteId, a, event, 2, isLifting)}
          ${buildAttemptCell(athleteId, a, event, 3, isLifting)}
        </div>`;
    }

    function buildAttemptCell(athleteId, a, event, num, isLifting = false) {
      const weightKey = `${event}${num}`;
      const resultKey = `${event}${num}Result`;
      const weight = a[weightKey];
      const result = a[resultKey] ?? "";

      let chipClass = "attempt-empty";
      let chipIcon = "";
      if (weight > 0) {
        if (result === "g") { chipClass = "attempt-good"; chipIcon = `<i class="fa-solid fa-check" style="font-size:.7rem;"></i>`; }
        else if (result === "x") { chipClass = "attempt-fail"; chipIcon = `<i class="fa-solid fa-xmark" style="font-size:.7rem;"></i>`; }
        else chipClass = "attempt-pending";
      }

      const weightDisplay = weight > 0 ? `${weight}` : "—";

      let weightSection;
      if (event === currentEvent) {
        weightSection = `
          <input class="weight-input" type="number" step="5" min="0"
            value="${weight > 0 ? weight : ""}"
            placeholder="wt"
            data-aid="${athleteId}" data-field="${weightKey}" />`;
      } else {
        weightSection = `<span>${weightDisplay}</span>`;
      }

      const isActiveEvent = event === currentEvent;
      const hasResult = result === "g" || result === "x";
      const controls = hasResult
        ? `<button class="btn-clear" data-aid="${athleteId}" data-field="${resultKey}" data-val="" title="Remove lift"><i class="fa-solid fa-rotate-left"></i></button>`
        : isLifting && isActiveEvent && weight > 0 ? `
          <div class="attempt-controls">
            <button class="btn-good" data-aid="${athleteId}" data-field="${resultKey}" data-val="g" title="Good lift">✓</button>
            <button class="btn-fail" data-aid="${athleteId}" data-field="${resultKey}" data-val="x" title="No lift">✗</button>
          </div>`
        : "";

      return `
        <div style="display:flex;align-items:center;gap:.35rem;">
          <div class="attempt-chip ${chipClass}" id="chip-${athleteId}-${event}${num}">
            ${chipIcon}
            ${weightSection}
          </div>
          ${controls}
        </div>`;
    }

    // Event delegation for result buttons and weight inputs
    document.getElementById("athleteList").addEventListener("click", async e => {
      const btn = e.target.closest("[data-field][data-val]");
      if (!btn) return;
      const { aid, field, val } = btn.dataset;
      const update = { [field]: val };

      // When clearing a 2nd or 3rd attempt, also wipe its weight
      if (val === "") {
        const match = field.match(/^(\w+?)(\d)Result$/);
        if (match && parseInt(match[2]) > 1) {
          update[`${match[1]}${match[2]}`] = 0;
        }
      }

      // On a good lift, focus the next attempt weight input after re-render
      if (val === "g") {
        const match = field.match(/^(\w+?)(\d)Result$/);
        if (match && parseInt(match[2]) < 3)
          pendingFocusField = { aid, field: `${match[1]}${parseInt(match[2]) + 1}` };
      }

      // On a failed lift, locally fill the next attempt input with the same weight and focus it.
      // The weight is NOT written to Firestore yet — the reorder triggers when they tab/Enter out.
      if (val === "x") {
        const match = field.match(/^(\w+?)(\d)Result$/);
        if (match) {
          const ev = match[1], num = parseInt(match[2]);
          if (num < 3) {
            const athleteData = lastSnap?.docs.find(d => d.id === aid)?.data();
            if (athleteData) {
              const nextWeightKey = `${ev}${num + 1}`;
              const sameWeight = athleteData[`${ev}${num}`];
              if (sameWeight && (!athleteData[nextWeightKey] || athleteData[nextWeightKey] === 0)) {
                pendingAutoFill = { aid, field: nextWeightKey, value: sameWeight };
              }
            }
          }
        }
      }

      await updateDoc(doc(db, "meets", meetId, "athletes", aid), update);
    });

    async function saveWeightInput(inp) {
      const { aid, field } = inp.dataset;
      const val = parseInt(inp.value) || 0;
      if (val > 0) {
        await updateDoc(doc(db, "meets", meetId, "athletes", aid), { [field]: val });
      }
    }

    // Save on blur (focus leaves field)
    document.getElementById("athleteList").addEventListener("focusout", async e => {
      const inp = e.target.closest("input.weight-input");
      if (!inp) return;
      await saveWeightInput(inp);
    });

    // Save on Enter key
    document.getElementById("athleteList").addEventListener("keydown", async e => {
      if (e.key !== "Enter") return;
      const inp = e.target.closest("input.weight-input");
      if (!inp) return;
      e.preventDefault();
      await saveWeightInput(inp);
    });

    function esc(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
