<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results — PLMTApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --navy: #0f172a; --navy2: #1e293b; --navy3: #334155;
      --blue: #3b82f6; --blue-dark: #2563eb;
      --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .navbar { background: var(--navy2); border-bottom: 1px solid var(--navy3); }
    .nav-link { color: var(--muted) !important; }
    .nav-link:hover, .nav-link.active { color: var(--text) !important; }
    .card { background: var(--navy2); border: 1px solid var(--navy3); color: var(--text); }
    .card-header { background: var(--navy3); border-bottom: 1px solid var(--navy3); font-weight: 600; }
    .alert-warning { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: #fcd34d; }

    /* Weight class section */
    .wc-section { margin-bottom: 2rem; }
    .wc-header {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: .75rem; padding-bottom: .5rem;
      border-bottom: 1px solid var(--navy3);
    }
    .wc-title { font-size: 1.1rem; font-weight: 700; }
    .wc-count { font-size: .8rem; color: var(--muted); }

    /* Results table */
    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); padding: .4rem .6rem; border-bottom: 1px solid var(--navy3);
      white-space: nowrap;
    }
    .results-table td {
      padding: .55rem .6rem; border-bottom: 1px solid rgba(51,65,85,.5); font-size: .88rem;
    }
    .results-table tr:hover td { background: rgba(255,255,255,.02); }
    .rank-cell { font-weight: 800; font-size: 1rem; text-align: center; width: 36px; }
    .rank-1 { color: #fbbf24; }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #b45309; }

    /* Attempt chips */
    .chip {
      display: inline-flex; align-items: center; gap: .2rem;
      padding: .2rem .45rem; border-radius: 5px; font-size: .75rem;
      font-weight: 600; border: 1px solid transparent;
    }
    .chip-empty { background: rgba(148,163,184,.06); color: #475569; border-color: var(--navy3); }
    .chip-pending { background: rgba(148,163,184,.1); color: var(--muted); border-color: #475569; }
    .chip-good { background: rgba(34,197,94,.15); color: #86efac; border-color: rgba(34,197,94,.3); }
    .chip-fail { background: rgba(239,68,68,.15); color: #fca5a5; border-color: rgba(239,68,68,.3); }
    .chip-best { background: rgba(34,197,94,.25); color: #4ade80; border-color: rgba(34,197,94,.5); font-weight: 800; }

    .total-cell { font-weight: 800; font-size: .95rem; color: #93c5fd; }
    .bombed { color: var(--red); font-size: .8rem; font-style: italic; }
    .designation-badge { font-size: .65rem; padding: .12em .4em; border-radius: 999px; font-weight: 600; }
    .badge-varsity { background: rgba(59,130,246,.2); color: #93c5fd; }
    .badge-jv { background: rgba(148,163,184,.15); color: var(--muted); }

    .filter-tabs { display: flex; gap: .4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-tab {
      padding: .35rem 1rem; border-radius: 6px; border: 1px solid var(--navy3);
      background: var(--navy2); color: var(--muted); cursor: pointer; font-size: .85rem;
    }
    .filter-tab:hover { background: var(--navy3); color: var(--text); }
    .filter-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    .live-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); margin-right: .3rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="fa-solid fa-trophy" style="color:var(--blue);font-size:1.3rem;"></i>
        <span style="font-weight:700;font-size:1.1rem;">PLMTApp</span>
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="setup.html">Setup</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
          <li class="nav-item"><a class="nav-link" href="platform.html">Platform</a></li>
          <li class="nav-item"><a class="nav-link" href="display.html">Display</a></li>
          <li class="nav-item"><a class="nav-link active" href="results.html">Results</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container px-4" style="max-width:1300px;">
    <div id="noMeetAlert" class="alert alert-warning d-none">
      <i class="fa-solid fa-triangle-exclamation me-2"></i>
      No active meet. <a href="setup.html" style="color:inherit;font-weight:600;">Go to Setup</a> to load a meet.
    </div>

    <div id="mainContent" class="d-none">
      <div class="d-flex align-items-center justify-content-between mb-1">
        <h1 class="fw-bold mb-0" style="font-size:1.6rem;">
          <i class="fa-solid fa-ranking-star me-2" style="color:var(--blue);"></i>Meet Results
        </h1>
        <div style="font-size:.82rem;color:var(--muted);">
          <span class="live-dot"></span>Live · <span id="meetBadge"></span>
        </div>
      </div>
      <p class="mb-3" style="color:var(--muted);">Rankings by weight class. Total = best squat + best bench + best deadlift.</p>

      <!-- Designation filter -->
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Varsity">Varsity</button>
        <button class="filter-tab" data-filter="JV">JV</button>
      </div>

      <div id="resultsContainer"></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getActiveMeetId, getActiveMeet,
      calcTotal, bestSquat, bestBench, bestDead, weightClassSort
    } from "./meet-utils.js";

    const meetId = getActiveMeetId();
    if (!meetId) {
      document.getElementById("noMeetAlert").classList.remove("d-none");
    } else {
      init();
    }

    let allAthletes = [];
    let activeFilter = "all";

    async function init() {
      const meet = await getActiveMeet();
      if (!meet) {
        document.getElementById("noMeetAlert").classList.remove("d-none");
        return;
      }
      document.getElementById("mainContent").classList.remove("d-none");
      document.getElementById("meetBadge").textContent = meet.name;

      // Filter tabs
      document.getElementById("filterTabs").addEventListener("click", e => {
        const tab = e.target.closest(".filter-tab");
        if (!tab) return;
        activeFilter = tab.dataset.filter;
        document.querySelectorAll(".filter-tab").forEach(t => t.classList.toggle("active", t === tab));
        renderResults();
      });

      // Real-time listener
      const q = query(collection(db, "meets", meetId, "athletes"), orderBy("weightClass"));
      onSnapshot(q, snap => {
        allAthletes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderResults();
      });
    }

    function renderResults() {
      const container = document.getElementById("resultsContainer");
      let athletes = allAthletes;
      if (activeFilter !== "all") {
        athletes = athletes.filter(a => a.designation === activeFilter);
      }

      if (athletes.length === 0) {
        container.innerHTML = `<div style="color:var(--muted);text-align:center;padding:3rem 0;">No athletes found.</div>`;
        return;
      }

      // Group by weight class
      const byWC = {};
      athletes.forEach(a => {
        const wc = a.weightClass || "Unknown";
        if (!byWC[wc]) byWC[wc] = [];
        byWC[wc].push(a);
      });

      // Sort weight classes
      const wcKeys = Object.keys(byWC).sort(weightClassSort);

      container.innerHTML = "";
      wcKeys.forEach(wc => {
        const group = byWC[wc];
        // Rank athletes: those with a total first (descending), then bombed-out
        const withTotal = group.filter(a => calcTotal(a) !== null);
        const bombed = group.filter(a => calcTotal(a) === null);
        withTotal.sort((a, b) => calcTotal(b) - calcTotal(a));

        const section = document.createElement("div");
        section.className = "wc-section";
        section.innerHTML = `
          <div class="wc-header">
            <span class="wc-title">${esc(wc)} lbs</span>
            <span class="wc-count">${group.length} athlete${group.length !== 1 ? "s" : ""}</span>
          </div>
          <div class="card">
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="results-table">
                  <thead>
                    <tr>
                      <th style="width:36px;">#</th>
                      <th>Athlete</th>
                      <th>School</th>
                      <th>Desig.</th>
                      <th>Bwt</th>
                      <th>SQ1</th><th>SQ2</th><th>SQ3</th><th>Best SQ</th>
                      <th>BP1</th><th>BP2</th><th>BP3</th><th>Best BP</th>
                      <th>DL1</th><th>DL2</th><th>DL3</th><th>Best DL</th>
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody id="tbody-${wc.replace(/\W/g,'_')}"></tbody>
                </table>
              </div>
            </div>
          </div>`;
        container.appendChild(section);

        const tbody = section.querySelector("tbody");
        [...withTotal, ...bombed].forEach((a, idx) => {
          const rank = idx + 1;
          const total = calcTotal(a);
          const sq = bestSquat(a);
          const bp = bestBench(a);
          const dl = bestDead(a);
          const desigClass = a.designation === "JV" ? "badge-jv" : "badge-varsity";
          let rankDisplay = "";
          if (total !== null) {
            const rankClass = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "";
            rankDisplay = `<span class="rank-cell ${rankClass}">${rank}</span>`;
          }

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="rank-cell">${rankDisplay}</td>
            <td class="fw-semibold">${esc(a.name)}</td>
            <td>${esc(a.school)}</td>
            <td><span class="designation-badge ${desigClass}">${esc(a.designation)}</span></td>
            <td>${a.bodyWeight || "—"}</td>
            ${attemptChip(a.squat1, a.squat1Result, sq)}
            ${attemptChip(a.squat2, a.squat2Result, sq)}
            ${attemptChip(a.squat3, a.squat3Result, sq)}
            <td>${sq > 0 ? sq : '<span style="color:var(--muted);">—</span>'}</td>
            ${attemptChip(a.bench1, a.bench1Result, bp)}
            ${attemptChip(a.bench2, a.bench2Result, bp)}
            ${attemptChip(a.bench3, a.bench3Result, bp)}
            <td>${bp > 0 ? bp : '<span style="color:var(--muted);">—</span>'}</td>
            ${attemptChip(a.dead1, a.dead1Result, dl)}
            ${attemptChip(a.dead2, a.dead2Result, dl)}
            ${attemptChip(a.dead3, a.dead3Result, dl)}
            <td>${dl > 0 ? dl : '<span style="color:var(--muted);">—</span>'}</td>
            <td class="total-cell">${total !== null ? total : '<span class="bombed">Bombed</span>'}</td>`;
          tbody.appendChild(tr);
        });
      });
    }

    function attemptChip(weight, result, best) {
      if (!weight || weight === 0) return `<td><span class="chip chip-empty">—</span></td>`;
      const isBest = result === "g" && weight === best;
      if (result === "g") {
        return `<td><span class="chip ${isBest ? "chip-best" : "chip-good"}"><i class="fa-solid fa-check" style="font-size:.6rem;"></i>${weight}</span></td>`;
      }
      if (result === "x") {
        return `<td><span class="chip chip-fail"><i class="fa-solid fa-xmark" style="font-size:.6rem;"></i>${weight}</span></td>`;
      }
      return `<td><span class="chip chip-pending">${weight}</span></td>`;
    }

    function esc(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
