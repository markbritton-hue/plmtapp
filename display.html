<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard — PLMTApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --navy: #0f172a; --navy2: #1e293b; --navy3: #334155;
      --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; margin: 0; }

    /* Header bar */
    .display-header {
      background: var(--navy2); border-bottom: 2px solid var(--blue);
      padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    .display-title { font-size: 1.4rem; font-weight: 800; letter-spacing: .02em; }
    .display-meet { font-size: .9rem; color: var(--muted); }
    .live-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      background: var(--green); margin-right: .4rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

    /* Platform columns layout */
    .platforms-wrapper {
      display: flex; gap: 1rem; padding: 1rem; height: calc(100vh - 62px); overflow: hidden;
    }
    .platform-col {
      flex: 1; background: var(--navy2); border: 1px solid var(--navy3); border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .platform-col-header {
      background: var(--navy3); padding: .6rem 1rem;
      font-size: 1rem; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; border-bottom: 1px solid #475569;
      display: flex; align-items: center; justify-content: space-between;
    }
    .platform-col-body { overflow-y: auto; padding: .5rem; flex: 1; }

    /* Athlete card */
    .disp-athlete {
      border: 1px solid var(--navy3); border-radius: 8px; margin-bottom: .6rem;
      overflow: hidden;
    }
    .disp-athlete-header {
      background: rgba(255,255,255,.04); padding: .4rem .75rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .disp-athlete-name { font-size: .95rem; font-weight: 700; }
    .disp-athlete-meta { font-size: .7rem; color: var(--muted); }
    .disp-athlete-body { padding: .4rem .75rem; }

    .disp-event-row { display: flex; align-items: center; gap: .3rem; margin-bottom: .3rem; }
    .disp-event-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); width: 42px; flex-shrink: 0;
    }

    /* Attempt chips — compact for display */
    .chip {
      display: inline-flex; align-items: center; gap: .2rem;
      padding: .2rem .45rem; border-radius: 5px; font-size: .75rem;
      font-weight: 600; border: 1px solid transparent; min-width: 58px;
    }
    .chip-empty { background: rgba(148,163,184,.06); color: var(--navy3); border-color: var(--navy3); }
    .chip-pending { background: rgba(148,163,184,.1); color: var(--muted); border-color: #475569; }
    .chip-good { background: rgba(34,197,94,.15); color: #86efac; border-color: rgba(34,197,94,.3); }
    .chip-fail { background: rgba(239,68,68,.15); color: #fca5a5; border-color: rgba(239,68,68,.3); }

    .total-pill {
      font-size: .7rem; padding: .2em .55em; border-radius: 999px;
      background: rgba(59,130,246,.2); color: #93c5fd; font-weight: 700;
    }
    .designation-badge { font-size: .62rem; padding: .12em .4em; border-radius: 999px; font-weight: 600; }
    .badge-varsity { background: rgba(59,130,246,.2); color: #93c5fd; }
    .badge-jv { background: rgba(148,163,184,.15); color: var(--muted); }

    .alert-warning { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: #fcd34d; }
  </style>
</head>
<body>
  <div id="noMeetAlert" class="alert alert-warning m-3 d-none">
    <i class="fa-solid fa-triangle-exclamation me-2"></i>
    No active meet. <a href="setup.html" style="color:inherit;font-weight:600;">Go to Setup</a> to load a meet.
  </div>

  <div id="mainContent" class="d-none">
    <div class="display-header">
      <div>
        <div class="display-title">
          <i class="fa-solid fa-trophy me-2" style="color:var(--blue);"></i>PLMTApp
        </div>
        <div class="display-meet" id="meetName">Loading…</div>
      </div>
      <div style="font-size:.85rem;color:var(--muted);">
        <span class="live-dot"></span>LIVE
      </div>
    </div>

    <div class="platforms-wrapper" id="platformsWrapper"></div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getActiveMeetId, getActiveMeet, calcTotal } from "./meet-utils.js";

    const meetId = getActiveMeetId();
    if (!meetId) {
      document.getElementById("noMeetAlert").classList.remove("d-none");
    } else {
      init();
    }

    async function init() {
      const meet = await getActiveMeet();
      if (!meet) {
        document.getElementById("noMeetAlert").classList.remove("d-none");
        return;
      }
      document.getElementById("mainContent").classList.remove("d-none");
      document.getElementById("meetName").textContent = `${meet.name} · ${meet.date || ""}`;

      const numPlatforms = meet.platforms || 1;
      const wrapper = document.getElementById("platformsWrapper");

      // Create platform columns
      const cols = {};
      for (let i = 1; i <= numPlatforms; i++) {
        const col = document.createElement("div");
        col.className = "platform-col";
        col.innerHTML = `
          <div class="platform-col-header">
            <span>Platform ${i}</span>
            <span id="count-${i}" style="font-size:.75rem;color:var(--muted);font-weight:400;"></span>
          </div>
          <div class="platform-col-body" id="platform-body-${i}"></div>`;
        wrapper.appendChild(col);
        cols[i] = col;
      }

      // Real-time listener for all athletes
      const q = query(
        collection(db, "meets", meetId, "athletes"),
        orderBy("platform"),
        orderBy("liftOrder")
      );
      onSnapshot(q, snap => {
        // Group by platform
        const byPlatform = {};
        for (let i = 1; i <= numPlatforms; i++) byPlatform[i] = [];
        snap.forEach(d => {
          const a = { id: d.id, ...d.data() };
          if (byPlatform[a.platform]) byPlatform[a.platform].push(a);
          else byPlatform[1].push(a);
        });

        for (let i = 1; i <= numPlatforms; i++) {
          const body = document.getElementById(`platform-body-${i}`);
          const countEl = document.getElementById(`count-${i}`);
          const athletes = byPlatform[i];
          countEl.textContent = `${athletes.length} athletes`;
          body.innerHTML = "";
          if (athletes.length === 0) {
            body.innerHTML = `<div style="color:var(--muted);text-align:center;padding:2rem 0;font-size:.85rem;">No athletes</div>`;
            continue;
          }
          athletes.forEach(a => body.appendChild(buildDispCard(a)));
        }
      });
    }

    function buildDispCard(a) {
      const div = document.createElement("div");
      div.className = "disp-athlete";
      const total = calcTotal(a);
      const desigClass = a.designation === "JV" ? "badge-jv" : "badge-varsity";
      div.innerHTML = `
        <div class="disp-athlete-header">
          <div>
            <span class="disp-athlete-name">${esc(a.name)}</span>
            <span class="designation-badge ${desigClass} ms-1">${esc(a.designation)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem;">
            <span class="disp-athlete-meta">${esc(a.school)} · ${esc(a.weightClass)}</span>
            ${total !== null ? `<span class="total-pill">${total}</span>` : ""}
          </div>
        </div>
        <div class="disp-athlete-body">
          ${buildDispEventRow(a, "squat", "SQ")}
          ${buildDispEventRow(a, "bench", "BP")}
          ${buildDispEventRow(a, "dead", "DL")}
        </div>`;
      return div;
    }

    function buildDispEventRow(a, event, label) {
      return `
        <div class="disp-event-row">
          <span class="disp-event-label">${label}</span>
          ${buildDispChip(a[`${event}1`], a[`${event}1Result`])}
          ${buildDispChip(a[`${event}2`], a[`${event}2Result`])}
          ${buildDispChip(a[`${event}3`], a[`${event}3Result`])}
        </div>`;
    }

    function buildDispChip(weight, result) {
      if (!weight || weight === 0) return `<span class="chip chip-empty">—</span>`;
      if (result === "g") return `<span class="chip chip-good"><i class="fa-solid fa-check" style="font-size:.6rem;"></i>${weight}</span>`;
      if (result === "x") return `<span class="chip chip-fail"><i class="fa-solid fa-xmark" style="font-size:.6rem;"></i>${weight}</span>`;
      return `<span class="chip chip-pending">${weight}</span>`;
    }

    function esc(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
