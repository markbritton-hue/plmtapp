<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display — PLMTApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a0f1e; --navy2: #1e293b; --navy3: #334155;
      --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy); color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    .top-bar {
      background: var(--navy2); border-bottom: 2px solid var(--blue);
      padding: .6rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .meet-name { font-size: 1rem; font-weight: 700; }
    .live-pill {
      font-size: .75rem; font-weight: 700; letter-spacing: .08em;
      color: var(--green); display: flex; align-items: center; gap: .4rem;
    }
    .live-dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

    /* Platform tabs */
    .platform-tabs { display: flex; gap: .5rem; }
    .ptab {
      background: var(--navy3); border: 1px solid #475569; color: var(--muted);
      border-radius: 6px; padding: .3rem .9rem; font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .ptab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── Main display area ── */
    .display-body {
      flex: 1; display: flex; flex-direction: column;
      padding: 1.5rem 2rem; gap: 1.5rem; overflow: hidden;
    }

    /* Now Lifting */
    .lifting-card {
      background: var(--navy2); border: 2px solid rgba(239,68,68,.5);
      border-radius: 16px; padding: 2rem 2.5rem; flex: 1;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .lifting-label {
      font-size: .85rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: #f87171; display: flex; align-items: center; gap: .5rem;
    }
    .lifting-name {
      font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; line-height: 1.05;
      letter-spacing: -.01em;
    }
    .lifting-meta {
      font-size: clamp(.85rem, 2vw, 1.15rem); color: var(--muted); font-weight: 500;
    }
    .lifting-weight {
      font-size: clamp(6rem, 20vw, 16rem); font-weight: 900; line-height: 1;
      color: #fff; letter-spacing: -.03em; text-align: center;
    }
    .lifting-weight-unit {
      font-size: clamp(2rem, 5vw, 4rem); color: var(--muted); font-weight: 600; margin-left: .25em;
    }
    .lifting-attempt {
      font-size: clamp(.85rem, 2vw, 1.2rem); color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; text-align: center;
    }

    /* On Deck */
    .ondeck-card {
      background: var(--navy2); border: 2px solid rgba(34,197,94,.35);
      border-radius: 14px; padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .ondeck-label {
      font-size: .75rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: #4ade80; margin-bottom: .2rem;
    }
    .ondeck-name { font-size: clamp(1.3rem, 3vw, 2.2rem); font-weight: 800; }
    .ondeck-meta { font-size: .9rem; color: var(--muted); }
    .ondeck-weight {
      font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900; color: #4ade80;
      display: flex; align-items: baseline; gap: .2em;
    }
    .ondeck-weight-unit { font-size: clamp(1rem, 2vw, 1.8rem); color: var(--muted); font-weight: 600; }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      color: var(--muted); font-size: 1.2rem;
    }

    .desig-badge {
      font-size: .7rem; font-weight: 700; padding: .15em .5em; border-radius: 999px;
    }
    .badge-varsity { background: rgba(168,85,247,.2); color: #d8b4fe; border: 1px solid rgba(168,85,247,.4); }
    .badge-jv      { background: rgba(34,197,94,.2);  color: #4ade80;  border: 1px solid rgba(34,197,94,.4); }

    .alert-warning { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: #fcd34d; }
  </style>
</head>
<body>

  <div id="noMeetAlert" class="alert alert-warning m-3 d-none">
    <i class="fa-solid fa-triangle-exclamation me-2"></i>
    No active meet. <a href="setup.html" style="color:inherit;font-weight:600;">Go to Setup</a> to load a meet.
  </div>

  <div id="mainContent" class="d-none" style="display:flex;flex-direction:column;height:100vh;">
    <div class="top-bar">
      <div class="meet-name" id="meetName">Loading…</div>
      <div class="platform-tabs" id="platformTabs"></div>
      <div class="live-pill"><span class="live-dot"></span>LIVE</div>
    </div>

    <div class="display-body" id="displayBody">
      <div class="empty-state">
        <i class="fa-solid fa-weight-hanging" style="font-size:3rem;opacity:.3;"></i>
        <span>Select a platform</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, onSnapshot, query, where, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getActiveMeetId, getActiveMeet } from "./meet-utils.js";

    const meetId = getActiveMeetId();
    if (!meetId) {
      document.getElementById("noMeetAlert").classList.remove("d-none");
    } else {
      init();
    }

    let unsubscribe = null;
    let currentPlatform = null;

    async function init() {
      const meet = await getActiveMeet();
      if (!meet) { document.getElementById("noMeetAlert").classList.remove("d-none"); return; }
      document.getElementById("mainContent").classList.remove("d-none");
      document.getElementById("mainContent").style.display = "flex";
      document.getElementById("meetName").textContent = `${meet.name}${meet.date ? " · " + meet.date : ""}`;

      const numPlatforms = meet.platforms || 1;
      const tabs = document.getElementById("platformTabs");
      for (let i = 1; i <= numPlatforms; i++) {
        const btn = document.createElement("button");
        btn.className = "ptab" + (i === 1 ? " active" : "");
        btn.textContent = `Platform ${i}`;
        btn.addEventListener("click", () => {
          document.querySelectorAll(".ptab").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectPlatform(i);
        });
        tabs.appendChild(btn);
      }
      selectPlatform(1);
    }

    function selectPlatform(p) {
      currentPlatform = p;
      if (unsubscribe) unsubscribe();

      const q = query(
        collection(db, "meets", meetId, "athletes"),
        where("platform", "==", p),
        orderBy("liftOrder")
      );
      unsubscribe = onSnapshot(q, snap => {
        const athletes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render(athletes);
      });
    }

    // ── Sort logic (mirrors platform.html) ───────────────────────────────────

    function getCurrentEvent(athletes) {
      for (const ev of ["squat", "bench", "dead"]) {
        if (athletes.some(a => {
          for (let n = 1; n <= 3; n++) {
            if ((a[`${ev}${n}Result`] ?? "") === "") return true;
          }
          return false;
        })) return ev;
      }
      return "dead";
    }

    function getCurrentRound(athletes, ev) {
      let min = 3;
      for (const a of athletes) {
        let done = 0;
        for (let n = 1; n <= 3; n++) {
          if ((a[`${ev}${n}Result`] ?? "") !== "") done = n;
          else break;
        }
        if (done < 3) min = Math.min(min, done);
      }
      return Math.min(min + 1, 3);
    }

    function isDone(a, ev, round) {
      const result = a[`${ev}${round}Result`] ?? "";
      if (result === "") return false;
      if (round === 3) return true;
      return (a[`${ev}${round + 1}`] || 0) > 0;
    }

    function getNextAttemptWeight(a, ev) {
      for (let n = 1; n <= 3; n++) {
        if ((a[`${ev}${n}Result`] ?? "") === "") return { weight: a[`${ev}${n}`] || 0, num: n };
      }
      return null;
    }

    function sortedAthletes(athletes, ev) {
      const round = getCurrentRound(athletes, ev);
      const list = [...athletes];
      list.sort((a, b) => {
        const aDone = isDone(a, ev, round);
        const bDone = isDone(b, ev, round);
        if (aDone !== bDone) return aDone ? 1 : -1;
        if (!aDone) {
          const wa = a[`${ev}${round}`] || 0;
          const wb = b[`${ev}${round}`] || 0;
          if (wa !== wb) return wa - wb;
        }
        return (a[`${ev}1`] || 0) - (b[`${ev}1`] || 0);
      });
      return list;
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render(athletes) {
      const body = document.getElementById("displayBody");

      if (athletes.length === 0) {
        body.innerHTML = `<div class="empty-state">
          <i class="fa-solid fa-weight-hanging" style="font-size:3rem;opacity:.3;"></i>
          <span>No athletes on this platform</span>
        </div>`;
        return;
      }

      const ev = getCurrentEvent(athletes);
      const evLabel = ev === "squat" ? "Squat" : ev === "bench" ? "Bench Press" : "Deadlift";
      const sorted = sortedAthletes(athletes, ev);

      const lifter = sorted[0];
      const onDeck = sorted[1] || null;

      const lifterNext = lifter ? getNextAttemptWeight(lifter, ev) : null;
      const onDeckNext = onDeck ? getNextAttemptWeight(onDeck, ev) : null;

      const desigBadge = a => {
        const cls = a.designation === "JV" ? "badge-jv" : "badge-varsity";
        return `<span class="desig-badge ${cls}">${esc(a.designation)}</span>`;
      };

      body.innerHTML = "";

      // Now Lifting card
      const liftCard = document.createElement("div");
      liftCard.className = "lifting-card";
      liftCard.innerHTML = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;">
          <div>
            <div class="lifting-label">
              <i class="fa-solid fa-circle-dot"></i> Now Lifting
            </div>
            <div class="lifting-name mt-2">
              ${esc(lifter.name)} ${desigBadge(lifter)}
            </div>
            <div class="lifting-meta mt-1">
              ${esc(lifter.school)} &nbsp;·&nbsp; ${esc(lifter.weightClass)} lbs class
            </div>
          </div>
        </div>
        <div style="text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div class="lifting-weight">
            ${lifterNext ? lifterNext.weight : "—"}<span class="lifting-weight-unit">lbs</span>
          </div>
          <div class="lifting-attempt mt-2">
            ${lifterNext ? `Attempt ${lifterNext.num} of 3 &nbsp;·&nbsp; ${evLabel}` : evLabel + " complete"}
          </div>
        </div>
      `;
      body.appendChild(liftCard);

      // On Deck card
      const deckCard = document.createElement("div");
      deckCard.className = "ondeck-card";
      if (onDeck) {
        deckCard.innerHTML = `
          <div>
            <div class="ondeck-label"><i class="fa-solid fa-angles-right me-1"></i>On Deck</div>
            <div class="ondeck-name">${esc(onDeck.name)} ${desigBadge(onDeck)}</div>
            <div class="ondeck-meta">${esc(onDeck.school)} · ${esc(onDeck.weightClass)} lbs class</div>
          </div>
          <div class="ondeck-weight">
            ${onDeckNext ? onDeckNext.weight : "—"}<span class="ondeck-weight-unit">lbs</span>
          </div>
        `;
      } else {
        deckCard.innerHTML = `
          <div>
            <div class="ondeck-label"><i class="fa-solid fa-angles-right me-1"></i>On Deck</div>
            <div class="ondeck-name" style="color:var(--muted);">—</div>
          </div>
        `;
      }
      body.appendChild(deckCard);
    }

    function esc(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
